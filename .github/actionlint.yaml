self-hosted-runner:
  labels: []

config-variables: null

# The orchestrate.yaml and promote.yaml files are generated by cascade.
# SC2129 (redirect consolidation) and SC2001 (sed vs parameter expansion) are
# style-level shellcheck suggestions that do not affect correctness.
paths:
  .github/workflows/orchestrate.yaml:
    ignore:
      - 'SC2129'
  .github/workflows/promote.yaml:
    ignore:
      - 'SC2001'
      - 'SC2129'
