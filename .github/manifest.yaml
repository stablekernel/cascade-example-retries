# yaml-language-server: $schema=https://stablekernel.github.io/cascade/manifest.schema.json
ci:
  config:
    schema_version: 1
    trunk_branch: main
    cli_version: v0.16.6-dryrun.82
    cli_version_sha: 82d7a676a50e7a54ad666d0f55277dcf04415cfb
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    environments: [staging, prod]
    triggers: [src/**]
    builds:
      - name: build
        workflow: .github/workflows/build.yaml
        triggers: []
    deploys:
      # The environment deploy under test. Its callback fails on the first
      # attempt and succeeds on the retry, so retries: 1 must rescue it: the
      # environment ends DEPLOYED and the run stays green. Downstream gating
      # keys on the effective result (the base attempt OR any retry attempt
      # succeeded), not on the immutable result of the first attempt.
      - name: app
        workflow: .github/workflows/deploy-app.yaml
        triggers: []
        retries: 1
      # A dependent deploy. It must RUN after app is rescued by the retry,
      # even though the first app attempt concluded failure, because the
      # dependency gate reads the effective result of app, not the immutable
      # result of the base job.
      - name: notify
        workflow: .github/workflows/deploy-notify.yaml
        triggers: []
        depends_on: [app]
  state:
    prod: {}
    staging:
      sha: 1e2de1192c3b7422e79a10cfd634e5fd89a651e8
      version: v0.16.6-dryrun.82
      committed_at: "2026-07-20T17:52:37Z"
      committed_by: joshua-temple
      builds:
        build:
          sha: 1e2de1192c3b7422e79a10cfd634e5fd89a651e8
          artifact_id: app-1e2de1192c3b7422e79a10cfd634e5fd89a651e8
      deploys:
        app:
          sha: 1e2de1192c3b7422e79a10cfd634e5fd89a651e8
          deployed_at: "2026-07-20T17:52:37Z"
          deployed_by: joshua-temple
        notify:
          sha: 1e2de1192c3b7422e79a10cfd634e5fd89a651e8
          deployed_at: "2026-07-20T17:52:37Z"
          deployed_by: joshua-temple
